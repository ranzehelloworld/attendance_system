<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <link rel="icon" type="image/png" href="iict-logo.png">
    <title>BSIT 1C | Attendance Portal</title>

    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />

    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>

    <style>
        .overflow-x-auto { -webkit-overflow-scrolling: touch; display: block; width: 100%; overflow-x: auto; }
        td { white-space: nowrap; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .retro-input-focus:focus { outline: none; border-bottom: 2px solid #9c4db9; background: rgba(156, 154, 185, 0.05); }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0c0e10; }
        ::-webkit-scrollbar-thumb { background: #282a2c; border-radius: 10px; }
        .toast {
            position: fixed; bottom: 2rem; right: 2rem; z-index: 9999;
            background: #1e2022; border: 1px solid rgba(156, 77, 185, 0.4);
            color: #9c4db9; padding: 0.75rem 1.5rem; border-radius: 0.5rem;
            font-family: 'Manrope', sans-serif; font-size: 0.75rem;
            letter-spacing: 0.1em; text-transform: uppercase;
            transform: translateY(100px); opacity: 0;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
        }
        .toast.show { transform: translateY(0); opacity: 1; }
    </style>

    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#9c4db9", "secondary": "#4caf50", "tertiary": "#ffb59b",
                        "surface": "#121416", "on-surface": "#e2e2e5", "outline": "#8e9197",
                        "surface-container": "#1e2022", "surface-container-low": "#1a1c1e",
                        "surface-container-high": "#282a2c", "surface-container-highest": "#333537",
                        "surface-container-lowest": "#0c0e10", "surface-bright": "#37393b",
                        "outline-variant": "#43474c", "error": "#ffb4ab"
                    },
                    fontFamily: { headline: ["Space Grotesk"], body: ["Manrope"], label: ["Manrope"] }
                }
            }
        }
    </script>
</head>

<body class="bg-surface text-on-surface font-body overflow-x-hidden min-h-screen">

    <div id="toast" class="toast"></div>

    <div id="login-screen" class="fixed inset-0 z-[9999] bg-surface flex items-center justify-center p-6">
        <div class="w-full max-w-md bg-surface-container p-8 rounded-xl border border-outline-variant/20 shadow-2xl">
            <div class="text-center mb-8">
                <h2 class="text-2xl font-headline font-bold text-primary tracking-widest uppercase">Admin</h2>
                <p class="text-xs text-outline font-label mt-2">Attendance Portal</p>
            </div>
            <div class="space-y-4">
                <input type="text" id="login-username" placeholder="Username" class="w-full bg-surface-container-highest border-none rounded-lg p-3 text-sm focus:ring-1 focus:ring-primary">
                <input type="password" id="login-pass" placeholder="Password" class="w-full bg-surface-container-highest border-none rounded-lg p-3 text-sm focus:ring-1 focus:ring-primary">
                <button onclick="handleLogin()" class="w-full bg-primary py-3 rounded-lg font-bold text-xs uppercase tracking-widest text-white hover:opacity-90 transition-all">Log In</button>
            </div>
            <p id="login-error" class="text-error text-[0.6rem] mt-4 text-center hidden uppercase tracking-tighter">Invalid Credentials</p>
        </div>
    </div>

    <div id="main-content" class="hidden">
        <div class="min-h-screen flex flex-col justify-center items-center px-6 py-12">
            <main class="w-full max-w-5xl mx-auto">
                
                <div class="mb-12 text-center relative">
                    <button onclick="handleLogout()" class="absolute right-0 top-0 text-outline hover:text-primary transition-colors flex items-center gap-2 text-[0.6rem] uppercase tracking-widest">
                        <span>Logout</span>
                        <span class="material-symbols-outlined text-sm">logout</span>
                    </button>

                    <h1 class="text-3xl font-headline font-bold text-primary tracking-[0.2em] uppercase" id="org-name">BSIT 1C</h1>
                    <p class="text-outline text-[0.6rem] tracking-[0.4em] uppercase mt-2">Isabela State University • Attendance System</p>
                </div>

                <section class="flex flex-col lg:flex-row lg:items-end justify-between gap-8 mb-12">
                    <div class="flex-1">
                        <label class="font-label text-[0.6875rem] uppercase tracking-[0.2em] text-outline mb-2 block">Event</label>
                        <input id="event-name" class="w-full bg-transparent border-none border-b-2 border-surface-container-highest text-2xl md:text-3xl font-headline font-medium text-on-surface py-2 px-0 retro-input-focus transition-all duration-300"
                            placeholder="Enter event name..." type="text" value="Flag Ceremony Attendance"/>
                    </div>
                    <div class="bg-surface-container-lowest px-6 py-4 rounded-lg flex items-center space-x-6 border border-outline-variant/5 shadow-xl">
                        <div class="text-right">
                            <div class="text-xs font-label uppercase tracking-widest text-outline">Time</div>
                            <div class="font-headline text-xl text-primary flex items-center justify-end">
                                <span id="clock-time" class="inline-block min-w-[120px] tabular-nums">--:--:--</span>
                                <span id="clock-ampm" class="text-[0.6rem] opacity-70 ml-1">--</span>
                            </div>
                        </div>
                        <div class="h-8 w-[1px] bg-outline-variant/20"></div>
                        <div>
                            <div class="text-xs font-label uppercase tracking-widest text-outline">Date</div>
                            <div class="font-headline text-lg text-on-surface" id="clock-date">--</div>
                        </div>
                    </div>
                </section>

                <section class="bg-surface-container rounded-xl overflow-hidden shadow-[0_40px_80px_rgba(0,0,0,0.6)] relative">
                    <div class="px-8 py-6 border-b border-outline-variant/10 flex flex-col sm:flex-row justify-between items-start sm:items-center bg-surface-container-low gap-4">
                        <div>
                            <h3 class="font-headline text-xl text-on-surface font-semibold tracking-tight">Attendance List</h3>
                            <p class="text-xs text-outline font-label tracking-wide uppercase mt-1">BSIT 1C • <span id="total-count">0</span> Students Enrolled</p>
                        </div>
                        <div class="flex space-x-3 w-full sm:w-auto">
                            <button onclick="exportCSV()" class="flex-1 sm:flex-none flex items-center justify-center space-x-2 bg-surface-container-highest px-4 py-2 rounded text-xs font-label uppercase tracking-wider hover:bg-surface-bright transition-colors">
                                <span class="material-symbols-outlined text-sm">csv</span>
                                <span>CSV</span>
                            </button>
                            <button onclick="exportPDF()" class="flex-1 sm:flex-none flex items-center justify-center space-x-2 bg-surface-container-highest px-4 py-2 rounded text-xs font-label uppercase tracking-wider hover:bg-surface-bright transition-colors">
                                <span class="material-symbols-outlined text-sm">picture_as_pdf</span>
                                <span>PDF</span>
                            </button>
                            <div class="relative w-full sm:w-64">
                                <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-sm">search</span>
                                <input type="text" id="student-search" placeholder="Search..." class="w-full bg-surface-container-highest border-none rounded-lg py-2 pl-10 pr-4 text-xs font-label text-on-surface focus:ring-1 focus:ring-primary transition-all" oninput="filterStudents()">
                            </div>
                        </div>
                    </div>

                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse">
                            <thead>
                                <tr class="bg-surface-container-lowest">
                                    <th class="px-8 py-4 font-label text-[0.65rem] uppercase tracking-widest text-outline">Name</th>
                                    <th class="px-8 py-4 font-label text-[0.65rem] uppercase tracking-widest text-outline text-right pr-8">Attendance</th>
                                </tr>
                            </thead>
                            <tbody id="student-table-body" class="divide-y divide-outline-variant/5"></tbody>
                        </table>
                    </div>

                    <footer class="bg-surface-container-lowest px-8 py-6 flex flex-wrap items-center justify-between gap-6 border-t border-outline-variant/10">
                        <div class="flex items-center space-x-8">
                            <div class="flex items-center space-x-3">
                                <div class="w-3 h-3 rounded-full bg-secondary"></div>
                                <span class="font-label text-[0.65rem] uppercase text-outline">Present: <span id="stat-present" class="text-on-surface font-bold ml-1">0</span></span>
                            </div>
                            <div class="flex items-center space-x-3">
                                <div class="w-3 h-3 rounded-full bg-tertiary"></div>
                                <span class="font-label text-[0.65rem] uppercase text-outline">Absent: <span id="stat-absent" class="text-on-surface font-bold ml-1">0</span></span>
                            </div>
                        </div>
                        <div class="flex-1 flex justify-center">
                            <div class="bg-surface-container-high px-4 py-2 rounded-full flex items-center space-x-4">
                                <div id="rate-bar" class="h-1.5 w-32 bg-surface-variant rounded-full overflow-hidden">
                                    <div id="rate-bar-fill" class="h-full bg-primary transition-all duration-500" style="width:0%"></div>
                                </div>
                                <div id="stat-rate" class="text-xs font-headline font-bold text-primary">0%</div>
                            </div>
                        </div>
                    </footer>
                </section>

                <div class="mt-12 text-center">
                    <p class="text-outline text-[0.6rem] uppercase tracking-[0.3em] opacity-40">1C Attendance System Version 4.8.26</p>
                </div>
            </main>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
                "firebase/database": "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js",
                "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"
            }
        }
    </script>

    <script type="module" src="script.js"></script>
</body>
</html>
